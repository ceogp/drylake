stages:
  - validate
  - deploy
  - verify

default:
  image: node:22-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

variables:
  NODE_ENV: production
  DEPLOY_FREEZE: "false"
  DATABASE_URL: postgresql://xupra_app:xupra_ci@postgres:5432/xupra_drylake
  POSTGRES_DB: xupra_drylake
  POSTGRES_USER: xupra_app
  POSTGRES_PASSWORD: xupra_ci
  APP_BASE_URL: http://localhost:3000
  APP_ENCRYPTION_KEY: gitlab-ci-dev-only-key-0000000000000000
  AUTH_MODE: dev
  DEFAULT_DEV_USER_EMAIL: owner@xupra.local
  DEFAULT_DEV_USER_NAME: Xupra Owner
  PLATFORM_ADMIN_EMAILS: owner@xupra.local
  ARTIFACT_STORAGE_DRIVER: local
  SECRETS_PROVIDER: env
  BILLING_ENFORCEMENT_MODE: development
  REQUIRE_HTTPS_URL: "true"

validate:
  stage: validate
  services:
    - name: postgres:16
      alias: postgres
      variables:
        POSTGRES_DB: xupra_drylake
        POSTGRES_USER: xupra_app
        POSTGRES_PASSWORD: xupra_ci
  script:
    - npm ci --include=dev --prefer-offline --no-audit --fund=false
    - |
      node <<'NODE'
      const { Client } = require("pg");

      const connectionString = process.env.DATABASE_URL;
      const maxAttempts = 30;

      async function waitForPostgres() {
        for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
          const client = new Client({ connectionString });

          try {
            await client.connect();
            await client.query("SELECT 1");
            await client.end();
            console.log("Postgres is ready.");
            return;
          } catch (error) {
            await client.end().catch(() => {});

            if (attempt === maxAttempts) {
              throw error;
            }

            console.log(`Waiting for Postgres (${attempt}/${maxAttempts})...`);
            await new Promise((resolve) => setTimeout(resolve, 2000));
          }
        }
      }

      waitForPostgres().catch((error) => {
        console.error(error);
        process.exit(1);
      });
      NODE
    - npx prisma generate
    - npx prisma migrate deploy
    - npx tsx prisma/seed.ts
    - npm run typecheck
    - npm run lint
    - npm run build
  rules:
    - if: $CI_COMMIT_BRANCH

.deploy_app:
  stage: deploy
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - script_failure
  image: node:22-bookworm
  before_script:
    - |
      missing_tools=""
      for tool in ssh-agent ssh-keyscan ssh scp git node; do
        if ! command -v "$tool" >/dev/null 2>&1; then
          missing_tools="$missing_tools $tool"
        fi
      done

      if [ -n "$missing_tools" ]; then
        echo "Installing missing deploy tools:$missing_tools"
        apt-get update
        apt-get install -y openssh-client git
      else
        echo "Deploy tools already available in CI image."
      fi
    - eval "$(ssh-agent -s)"
    - mkdir -p ~/.ssh
    - |
      key_path=~/.ssh/deploy_key
      if [ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
        echo "DEPLOY_SSH_PRIVATE_KEY is empty or undefined." >&2
        exit 1
      fi

      if [ -f "$DEPLOY_SSH_PRIVATE_KEY" ]; then
        cp "$DEPLOY_SSH_PRIVATE_KEY" "$key_path"
        chmod 600 "$key_path"
        if ! ssh-add "$key_path" >/dev/null 2>&1; then
          bytes="$(wc -c < "$key_path" | tr -d ' ')"
          echo "Unable to load file-based DEPLOY_SSH_PRIVATE_KEY into ssh-agent (bytes=$bytes)." >&2
          exit 1
        fi
      else
        key_value="$(printf '%s' "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r')"
        key_value="${key_value#\"}"
        key_value="${key_value%\"}"
        key_value="${key_value#\'}"
        key_value="${key_value%\'}"
        raw_candidate="${key_path}.raw"
        escaped_candidate="${key_path}.escaped"
        b64_candidate="${key_path}.b64"
        selected_key=""

        # Try the most common formats in order: raw multiline, escaped newline text, and base64.
        printf '%s\n' "$key_value" > "$raw_candidate"
        printf '%b' "$key_value" > "$escaped_candidate"
        if ! printf '%s' "$key_value" | base64 -d > "$b64_candidate" 2>/dev/null; then
          rm -f "$b64_candidate"
        fi

        for candidate in "$raw_candidate" "$escaped_candidate" "$b64_candidate"; do
          if [ -s "$candidate" ]; then
            chmod 600 "$candidate"
          fi

          if [ -s "$candidate" ] && ssh-add "$candidate" >/dev/null 2>&1; then
            selected_key="$candidate"
            break
          fi
        done

        if [ -z "$selected_key" ]; then
          has_begin_marker="no"
          has_escaped_newlines="no"
          if printf '%s' "$key_value" | grep -q 'BEGIN .* PRIVATE KEY'; then
            has_begin_marker="yes"
          fi
          if printf '%s' "$key_value" | grep -q '\\n'; then
            has_escaped_newlines="yes"
          fi
          echo "Unable to load DEPLOY_SSH_PRIVATE_KEY (length=${#key_value}, begin_marker=$has_begin_marker, escaped_newlines=$has_escaped_newlines)." >&2
          exit 1
        fi

        cp "$selected_key" "$key_path"
        rm -f "$raw_candidate" "$escaped_candidate" "$b64_candidate"
      fi

      chmod 600 "$key_path"
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - ': "${DEPLOY_HOST:?DEPLOY_HOST is required}"'
    - ': "${DEPLOY_SSH_USER:?DEPLOY_SSH_USER is required}"'
    - ': "${DEPLOY_SSH_PRIVATE_KEY:?DEPLOY_SSH_PRIVATE_KEY is required}"'
    - ': "${DEPLOY_ENV_FILE:?DEPLOY_ENV_FILE is required}"'
    - git archive --format=tar HEAD -o release.tar
    - |
      if [ -f "$DEPLOY_ENV_FILE" ]; then
        cp "$DEPLOY_ENV_FILE" deploy.env
      else
        printf "%s" "$DEPLOY_ENV_FILE" > deploy.env
      fi
    - |
      app_base_url="${DEPLOY_URL:-}"
      if [ -z "$app_base_url" ]; then
        app_base_url="$(grep -E '^APP_BASE_URL=' deploy.env | tail -n 1 | cut -d'=' -f2-)"
      fi

      if [ -z "$app_base_url" ]; then
        echo "APP_BASE_URL is required in DEPLOY_ENV_FILE or DEPLOY_URL." >&2
        exit 1
      fi

      if [ "${REQUIRE_HTTPS_URL:-true}" = "true" ]; then
        if ! printf '%s' "$app_base_url" | grep -Eq '^https://'; then
          echo "APP_BASE_URL must use https. Set STAGING_URL to an https domain URL." >&2
          exit 1
        fi
      fi

      app_host="$(printf '%s' "$app_base_url" | sed -E 's#^https://([^/]+).*$#\1#')"
      app_host_no_port="${app_host%%:*}"
      if [ "${REQUIRE_HTTPS_URL:-true}" = "true" ]; then
        if printf '%s' "$app_host_no_port" | grep -Eq '^[0-9]{1,3}(\\.[0-9]{1,3}){3}$'; then
          echo "APP_BASE_URL must use a domain host, not a raw IP ($app_host_no_port)." >&2
          exit 1
        fi
      fi

      if grep -Eq '^APP_BASE_URL=' deploy.env; then
        sed -i "s#^APP_BASE_URL=.*#APP_BASE_URL=$app_base_url#" deploy.env
      else
        printf '\nAPP_BASE_URL=%s\n' "$app_base_url" >> deploy.env
      fi
    - |
      {
        printf '\nXUPRA_RELEASE_SHA=%s\n' "$CI_COMMIT_SHA"
        printf 'XUPRA_RELEASE_SHORT_SHA=%s\n' "$CI_COMMIT_SHORT_SHA"
        printf 'XUPRA_RELEASE_REF=%s\n' "$CI_COMMIT_REF_NAME"
        printf 'XUPRA_RELEASE_PIPELINE_ID=%s\n' "$CI_PIPELINE_ID"
        printf 'XUPRA_RELEASE_DEPLOYED_AT=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      } >> deploy.env
    - |
      node <<'NODE'
      const fs = require("node:fs");

      const prefixes = ["DEVELOPMENT", "STAGING", "PRODUCTION"];
      const currentName = process.env.CI_ENVIRONMENT_NAME || "current";

      function stripQuotes(value) {
        const trimmed = String(value || "").trim();
        if (
          (trimmed.startsWith('"') && trimmed.endsWith('"')) ||
          (trimmed.startsWith("'") && trimmed.endsWith("'"))
        ) {
          return trimmed.slice(1, -1);
        }
        return trimmed;
      }

      function parseEnvFile(value) {
        if (!value) return {};

        const raw = fs.existsSync(value) ? fs.readFileSync(value, "utf8") : value;
        const parsed = {};

        for (const line of raw.split(/\r?\n/)) {
          const match = line.match(/^([A-Za-z_][A-Za-z0-9_]*)=(.*)$/);
          if (!match) continue;
          parsed[match[1]] = stripQuotes(match[2]);
        }

        return parsed;
      }

      function appOrigin(value) {
        if (!value) return "";
        try {
          return new URL(stripQuotes(value)).origin.toLowerCase();
        } catch {
          return stripQuotes(value).replace(/\/+$/, "").toLowerCase();
        }
      }

      function databaseFingerprint(value) {
        if (!value) return "";
        try {
          const url = new URL(stripQuotes(value));
          const database = url.pathname.replace(/^\/+/, "");
          const port = url.port || "5432";
          return `${url.hostname.toLowerCase()}:${port}/${database}`;
        } catch {
          return "";
        }
      }

      function normalize(value) {
        return stripQuotes(value).trim().toLowerCase();
      }

      function collect(prefix) {
        const envFile = parseEnvFile(process.env[`${prefix}_ENV_FILE`]);

        return {
          name: prefix.toLowerCase(),
          deployHost: normalize(process.env[`${prefix}_HOST`]),
          appBaseUrl: appOrigin(process.env[`${prefix}_URL`] || envFile.APP_BASE_URL),
          database: databaseFingerprint(envFile.DATABASE_URL),
          s3Bucket: normalize(envFile.AWS_S3_BUCKET),
        };
      }

      const currentEnvFile = parseEnvFile("deploy.env");
      const current = {
        name: currentName,
        deployHost: normalize(process.env.DEPLOY_HOST),
        appBaseUrl: appOrigin(process.env.DEPLOY_URL || currentEnvFile.APP_BASE_URL),
        database: databaseFingerprint(currentEnvFile.DATABASE_URL),
        s3Bucket: normalize(currentEnvFile.AWS_S3_BUCKET),
        artifactDriver: normalize(currentEnvFile.ARTIFACT_STORAGE_DRIVER),
      };

      const missingCurrent = [];
      if (!current.deployHost) missingCurrent.push("DEPLOY_HOST");
      if (!current.appBaseUrl) missingCurrent.push("APP_BASE_URL/DEPLOY_URL");
      if (!current.database) missingCurrent.push("DATABASE_URL");
      if (current.artifactDriver !== "s3") missingCurrent.push("ARTIFACT_STORAGE_DRIVER=s3");
      if (!current.s3Bucket) missingCurrent.push("AWS_S3_BUCKET");

      if (missingCurrent.length > 0) {
        console.error(`Deploy isolation guard failed: ${current.name} is missing ${missingCurrent.join(", ")}.`);
        process.exit(1);
      }

      const configured = prefixes
        .map(collect)
        .filter((item) => item.deployHost || item.appBaseUrl || item.database || item.s3Bucket);

      if (!configured.some((item) => item.name === current.name)) {
        configured.push(current);
      }

      const fields = [
        ["deployHost", "DEPLOY_HOST"],
        ["appBaseUrl", "APP_BASE_URL"],
        ["database", "DATABASE_URL host/database"],
        ["s3Bucket", "AWS_S3_BUCKET"],
      ];
      const failures = [];

      for (let leftIndex = 0; leftIndex < configured.length; leftIndex += 1) {
        for (let rightIndex = leftIndex + 1; rightIndex < configured.length; rightIndex += 1) {
          const left = configured[leftIndex];
          const right = configured[rightIndex];

          if (left.name === right.name) continue;

          for (const [field, label] of fields) {
            if (left[field] && right[field] && left[field] === right[field]) {
              failures.push(`${left.name} and ${right.name} share ${label}: ${left[field]}`);
            }
          }
        }
      }

      if (failures.length > 0) {
        console.error("Deploy isolation guard failed:");
        for (const failure of failures) {
          console.error(`- ${failure}`);
        }
        process.exit(1);
      }

      console.log(`Deploy isolation guard passed for ${current.name}.`);
      NODE
    - |
      for attempt in 1 2 3; do
        if scp release.tar "$DEPLOY_SSH_USER@$DEPLOY_HOST:/tmp/xupra-release.tar"; then
          break
        fi
        if [ "$attempt" -eq 3 ]; then
          exit 1
        fi
        sleep 5
      done
    - |
      for attempt in 1 2 3; do
        if scp deploy.env "$DEPLOY_SSH_USER@$DEPLOY_HOST:/tmp/xupra-deploy.env"; then
          break
        fi
        if [ "$attempt" -eq 3 ]; then
          exit 1
        fi
        sleep 5
      done
    - |
      for attempt in 1 2 3; do
        if scp scripts/deploy/remote-bootstrap.sh "$DEPLOY_SSH_USER@$DEPLOY_HOST:/tmp/xupra-bootstrap.sh"; then
          break
        fi
        if [ "$attempt" -eq 3 ]; then
          exit 1
        fi
        sleep 5
      done
    - |
      for attempt in 1 2 3; do
        if ssh "$DEPLOY_SSH_USER@$DEPLOY_HOST" \
          "chmod +x /tmp/xupra-bootstrap.sh && \
          sudo APP_DIR=/srv/xupra-drylake \
          APP_USER=xupra \
          APP_GROUP=xupra \
          RELEASE_TAR=/tmp/xupra-release.tar \
          ENV_FILE=/tmp/xupra-deploy.env \
          REQUIRE_HTTPS_URL="${REQUIRE_HTTPS_URL:-true}" \
          bash /tmp/xupra-bootstrap.sh"; then
          break
        fi
        if [ "$attempt" -eq 3 ]; then
          exit 1
        fi
        sleep 10
      done

.verify_app:
  stage: verify
  image: node:22-bookworm
  before_script:
    - |
      if ! command -v curl >/dev/null 2>&1; then
        apt-get update
        apt-get install -y curl
      fi
  script:
    - bash scripts/deploy/verify-deploy.sh

deploy_development:
  extends: .deploy_app
  variables:
    DEPLOY_HOST: $DEVELOPMENT_HOST
    DEPLOY_SSH_USER: $DEVELOPMENT_SSH_USER
    DEPLOY_SSH_PRIVATE_KEY: $DEVELOPMENT_SSH_PRIVATE_KEY
    DEPLOY_ENV_FILE: $DEVELOPMENT_ENV_FILE
    DEPLOY_URL: $DEVELOPMENT_URL
  environment:
    name: development
    url: $DEVELOPMENT_URL
  rules:
    - if: '$DEPLOY_FREEZE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "development" && $CI_COMMIT_REF_PROTECTED == "true" && $DEVELOPMENT_HOST && $DEVELOPMENT_SSH_USER && $DEVELOPMENT_SSH_PRIVATE_KEY && $DEVELOPMENT_ENV_FILE'
      when: manual

verify_development:
  extends: .verify_app
  variables:
    APP_BASE_URL: $DEVELOPMENT_URL
    ADMIN_INTERNAL_HOST: $DEVELOPMENT_ADMIN_INTERNAL_HOST
  needs: [deploy_development]
  rules:
    - if: '$DEPLOY_FREEZE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "development" && $CI_COMMIT_REF_PROTECTED == "true" && $DEVELOPMENT_HOST && $DEVELOPMENT_SSH_USER && $DEVELOPMENT_SSH_PRIVATE_KEY && $DEVELOPMENT_ENV_FILE && $DEVELOPMENT_URL'
      when: on_success

deploy_staging:
  extends: .deploy_app
  variables:
    DEPLOY_HOST: $STAGING_HOST
    DEPLOY_SSH_USER: $STAGING_SSH_USER
    DEPLOY_SSH_PRIVATE_KEY: $STAGING_SSH_PRIVATE_KEY
    DEPLOY_ENV_FILE: $STAGING_ENV_FILE
    DEPLOY_URL: $STAGING_URL
    REQUIRE_HTTPS_URL: "true"
  environment:
    name: staging
    url: $STAGING_URL
  rules:
    - if: '$DEPLOY_FREEZE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_COMMIT_REF_PROTECTED == "true" && $STAGING_HOST && $STAGING_SSH_USER && $STAGING_SSH_PRIVATE_KEY && $STAGING_ENV_FILE'
      when: manual

verify_staging:
  extends: .verify_app
  variables:
    APP_BASE_URL: $STAGING_URL
    ADMIN_INTERNAL_HOST: $STAGING_ADMIN_INTERNAL_HOST
  needs: [deploy_staging]
  rules:
    - if: '$DEPLOY_FREEZE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_COMMIT_REF_PROTECTED == "true" && $STAGING_HOST && $STAGING_SSH_USER && $STAGING_SSH_PRIVATE_KEY && $STAGING_ENV_FILE && $STAGING_URL'
      when: on_success

deploy_production:
  extends: .deploy_app
  variables:
    DEPLOY_HOST: $PRODUCTION_HOST
    DEPLOY_SSH_USER: $PRODUCTION_SSH_USER
    DEPLOY_SSH_PRIVATE_KEY: $PRODUCTION_SSH_PRIVATE_KEY
    DEPLOY_ENV_FILE: $PRODUCTION_ENV_FILE
    DEPLOY_URL: $PRODUCTION_URL
  environment:
    name: production
    url: $PRODUCTION_URL
  rules:
    - if: '$DEPLOY_FREEZE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true" && $PRODUCTION_HOST && $PRODUCTION_SSH_USER && $PRODUCTION_SSH_PRIVATE_KEY && $PRODUCTION_ENV_FILE'
      when: manual

verify_production:
  extends: .verify_app
  variables:
    APP_BASE_URL: $PRODUCTION_URL
    ADMIN_INTERNAL_HOST: $PRODUCTION_ADMIN_INTERNAL_HOST
  needs: [deploy_production]
  rules:
    - if: '$DEPLOY_FREEZE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true" && $PRODUCTION_HOST && $PRODUCTION_SSH_USER && $PRODUCTION_SSH_PRIVATE_KEY && $PRODUCTION_ENV_FILE && $PRODUCTION_URL'
      when: on_success
