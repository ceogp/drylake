<svg width="1400" height="960" viewBox="0 0 1400 960" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DryLake dl product mark gap v3">
  <rect width="1400" height="960" fill="#090a0a"/>
  <style>
    .label { font-family: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace; font-size: 22px; font-weight: 700; letter-spacing: 0; fill: #f7f4ea; }
    .note { font-family: Helvetica, "Helvetica Neue", sans-serif; font-size: 18px; font-weight: 400; letter-spacing: 0; fill: #a6aca5; }
    .word { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 82px; font-weight: 800; letter-spacing: 0; fill: #f7f4ea; }
    .mark { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 214px; font-weight: 800; letter-spacing: 0; }
    .panel { fill: #111414; stroke: #28302b; stroke-width: 2; }
    .crackDark { fill: none; stroke: #151008; stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; }
    .crackCut { fill: none; stroke: #090a0a; stroke-width: 7; stroke-linecap: square; stroke-linejoin: miter; }
  </style>

  <text x="72" y="95" class="word">drylake</text>
  <rect x="76" y="130" width="390" height="18" fill="#ff5a1f"/>
  <text x="72" y="190" class="note">Gap v3: separated mono d and l. The letters no longer touch in color or one-color modes.</text>

  <defs>
    <clipPath id="gapDClipA">
      <text x="18" y="220" class="mark">d</text>
    </clipPath>
    <clipPath id="gapDClipB">
      <text x="6" y="220" class="mark">d</text>
    </clipPath>
    <clipPath id="gapDClipC">
      <text x="18" y="220" class="mark">d</text>
    </clipPath>
  </defs>

  <g transform="translate(70 250)">
    <rect class="panel" x="0" y="0" width="390" height="540" rx="8"/>
    <text class="label" x="34" y="54">A. Clear Gap</text>
    <text class="note" x="34" y="86">Separated d + orange l</text>
    <g transform="translate(63 135)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="18" y="220" class="mark" fill="#f7f4ea">d</text>
      <text x="176" y="220" class="mark" fill="#ff5a1f">l</text>
      <g clip-path="url(#gapDClipA)">
        <path class="crackDark" d="M58 84l34 28 34-12 32 24"/>
        <path class="crackDark" d="M92 112l-18 42 30 27-8 42"/>
        <path class="crackDark" d="M128 103l11 41 33 22"/>
        <path class="crackDark" d="M72 170l42-4 31 30 34-8"/>
      </g>
    </g>
    <text x="34" y="464" class="word" style="font-size:48px">drylake</text>
    <rect x="36" y="490" width="190" height="12" fill="#ff5a1f"/>
  </g>

  <g transform="translate(505 250)">
    <rect class="panel" x="0" y="0" width="390" height="540" rx="8"/>
    <text class="label" x="34" y="54">B. Wider Gap</text>
    <text class="note" x="34" y="86">Most readable small</text>
    <g transform="translate(63 135)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="6" y="220" class="mark" fill="#f7f4ea">d</text>
      <text x="188" y="220" class="mark" fill="#ff5a1f">l</text>
      <g clip-path="url(#gapDClipB)">
        <path class="crackDark" d="M46 84l34 28 34-12 32 24"/>
        <path class="crackDark" d="M80 112l-18 42 30 27-8 42"/>
        <path class="crackDark" d="M116 103l11 41 33 22"/>
        <path class="crackDark" d="M60 170l42-4 31 30 34-8"/>
      </g>
    </g>
    <text x="34" y="464" class="word" style="font-size:48px">drylake</text>
    <rect x="36" y="490" width="190" height="12" fill="#ff5a1f"/>
  </g>

  <g transform="translate(940 250)">
    <rect class="panel" x="0" y="0" width="390" height="540" rx="8"/>
    <text class="label" x="34" y="54">C. Mono Gap</text>
    <text class="note" x="34" y="86">White-only extension icon</text>
    <g transform="translate(63 135)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#090a0a" stroke="#2b332e" stroke-width="10"/>
      <text x="18" y="220" class="mark" fill="#f7f4ea">d</text>
      <text x="176" y="220" class="mark" fill="#f7f4ea">l</text>
      <g clip-path="url(#gapDClipC)">
        <path class="crackCut" d="M58 84l34 28 34-12 32 24"/>
        <path class="crackCut" d="M92 112l-18 42 30 27-8 42"/>
        <path class="crackCut" d="M128 103l11 41 33 22"/>
        <path class="crackCut" d="M72 170l42-4 31 30 34-8"/>
      </g>
    </g>
    <text x="34" y="464" class="word" style="font-size:48px">drylake</text>
    <rect x="36" y="490" width="190" height="12" fill="#f7f4ea"/>
  </g>

  <g transform="translate(92 845)">
    <text class="label" x="0" y="0">Small-size read:</text>
    <g transform="translate(220 -62) scale(.32)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="6" y="220" class="mark" fill="#f7f4ea">d</text>
      <text x="188" y="220" class="mark" fill="#ff5a1f">l</text>
    </g>
    <g transform="translate(342 -47) scale(.24)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="6" y="220" class="mark" fill="#f7f4ea">d</text>
      <text x="188" y="220" class="mark" fill="#ff5a1f">l</text>
    </g>
    <g transform="translate(444 -36) scale(.17)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="6" y="220" class="mark" fill="#f7f4ea">d</text>
      <text x="188" y="220" class="mark" fill="#ff5a1f">l</text>
    </g>
    <text class="note" x="540" y="0">This version favors readability over a fused monogram.</text>
  </g>
</svg>
