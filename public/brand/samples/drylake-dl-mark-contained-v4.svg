  <text x="72" y="95" class="word">drylake</text>
  <rect x="76" y="130" width="390" height="18" fill="#ff5a1f"/>
  <text x="72" y="190" class="note">Contained v4: visible gap, smaller glyphs, and the l stays inside the icon border.</text>

  <defs>
    <clipPath id="containedDClipA">
      <text x="28" y="214" class="mark">d</text>
    </clipPath>
    <clipPath id="containedDClipB">
      <text x="18" y="214" class="mark">d</text>
    </clipPath>
    <clipPath id="containedDClipC">
      <text x="28" y="214" class="mark">d</text>
