      <text x="28" y="214" class="mark" fill="#f7f4ea">d</text>
      <text x="150" y="214" class="mark" fill="#ff5a1f">l</text>
    </g>
    <g transform="translate(444 -36) scale(.17)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="28" y="214" class="mark" fill="#f7f4ea">d</text>
