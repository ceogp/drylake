<svg width="1400" height="960" viewBox="0 0 1400 960" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DryLake refined lowercase d product mark">
  <rect width="1400" height="960" fill="#090a0a"/>
  <style>
    .label { font-family: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace; font-size: 22px; font-weight: 700; letter-spacing: 0; fill: #f7f4ea; }
    .note { font-family: Helvetica, "Helvetica Neue", sans-serif; font-size: 18px; font-weight: 400; letter-spacing: 0; fill: #a6aca5; }
    .word { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 82px; font-weight: 800; letter-spacing: 0; fill: #f7f4ea; }
    .dFont { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 292px; font-weight: 800; letter-spacing: 0; }
    .panel { fill: #111414; stroke: #28302b; stroke-width: 2; }
    .cream { fill: #f7f4ea; }
    .black { fill: #090a0a; }
    .orange { fill: #ff5a1f; }
    .green { fill: #80d99a; }
    .crackDark { fill: none; stroke: #151008; stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; }
    .crackLight { fill: none; stroke: #090a0a; stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; }
    .crackCut { fill: none; stroke: #090a0a; stroke-width: 7; stroke-linecap: square; stroke-linejoin: miter; }
    .lStroke { fill: none; stroke: #ff5a1f; stroke-width: 22; stroke-linecap: square; stroke-linejoin: miter; }
    .monoStroke { fill: none; stroke-width: 22; stroke-linecap: square; stroke-linejoin: miter; }
  </style>

  <text x="72" y="95" class="word">drylake</text>
  <rect x="76" y="130" width="438" height="18" class="orange"/>
  <text x="72" y="190" class="note">Refined product mark: lowercase d from the DryLake mono direction, orange l-stem, cracked lakebed texture.</text>

