    <g transform="translate(350 -48) scale(.23)">
      <rect x="0" y="0" width="280" height="280" rx="32" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="73" y="278" class="dFont cream">d</text>
      <path class="lStroke" d="M210 40v206M190 40h48M210 246h58"/>
    </g>
    <g transform="translate(456 -36) scale(.16)">
      <rect x="0" y="0" width="280" height="280" rx="32" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="73" y="278" class="dFont cream">d</text>
      <path class="lStroke" d="M210 40v206M190 40h48M210 246h58"/>
    </g>
    <text class="note" x="550" y="0">Cracks stay in large artwork. Tiny icons keep the d + l structure clean.</text>
