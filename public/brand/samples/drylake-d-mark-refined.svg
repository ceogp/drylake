      <path class="monoStroke" stroke="#090a0a" d="M210 40v206M190 40h48M210 246h58"/>
    </g>
    <text x="34" y="464" class="word" style="font-size:48px">drylake</text>
    <rect x="36" y="490" width="242" height="12" class="orange"/>
