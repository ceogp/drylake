<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DryLake product logo options">
  <rect width="1400" height="900" fill="#090a0a"/>
  <style>
    .label { font-family: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace; font-size: 22px; font-weight: 700; letter-spacing: 0; fill: #f5f0e5; }
    .note { font-family: Helvetica, "Helvetica Neue", Arial, sans-serif; font-size: 18px; font-weight: 400; letter-spacing: 0; fill: #a6aca5; }
    .word { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 70px; font-weight: 800; letter-spacing: 0; fill: #f5f0e5; }
    .panel { fill: #111414; stroke: #28302b; stroke-width: 2; }
    .cream { fill: #f5f0e5; }
    .green { fill: #80d99a; }
    .orange { fill: #ff5a1f; }
    .strokeCream { fill: none; stroke: #f5f0e5; stroke-width: 18; stroke-linecap: square; stroke-linejoin: round; }
    .strokeThin { fill: none; stroke: #f5f0e5; stroke-width: 8; stroke-linecap: square; stroke-linejoin: round; }
    .strokeOrange { fill: none; stroke: #ff5a1f; stroke-width: 12; stroke-linecap: square; }
  </style>

  <text x="72" y="86" class="word">drylake</text>
  <rect x="74" y="120" width="340" height="18" class="orange"/>
  <text x="72" y="180" class="note">Product mark options. No Xupra X. Designed for Marketplace, VS Code, and website headers.</text>

