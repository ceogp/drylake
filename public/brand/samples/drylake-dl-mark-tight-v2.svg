<svg width="1400" height="960" viewBox="0 0 1400 960" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DryLake dl product mark v2">
  <rect width="1400" height="960" fill="#090a0a"/>
  <style>
    .label { font-family: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace; font-size: 22px; font-weight: 700; letter-spacing: 0; fill: #f7f4ea; }
    .note { font-family: Helvetica, "Helvetica Neue", sans-serif; font-size: 18px; font-weight: 400; letter-spacing: 0; fill: #a6aca5; }
    .word { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 82px; font-weight: 800; letter-spacing: 0; fill: #f7f4ea; }
    .markD { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 230px; font-weight: 800; letter-spacing: 0; }
    .markL { font-family: "Cascadia Mono", "IBM Plex Mono", Consolas, monospace; font-size: 230px; font-weight: 800; letter-spacing: 0; }
    .panel { fill: #111414; stroke: #28302b; stroke-width: 2; }
    .crackDark { fill: none; stroke: #151008; stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; }
  </style>

  <text x="72" y="95" class="word">drylake</text>
  <rect x="76" y="130" width="404" height="18" fill="#ff5a1f"/>
  <text x="72" y="190" class="note">Closer lockup v2: d moved left for clear spacing, l holds the right edge, shorter underline under the wordmark.</text>

  <defs>
    <clipPath id="dClipMain">
      <text x="30" y="226" class="markD">d</text>
    </clipPath>
    <clipPath id="dClipMono">
      <text x="30" y="226" class="markD">d</text>
    </clipPath>
  </defs>

  <g transform="translate(70 250)">
    <rect class="panel" x="0" y="0" width="390" height="540" rx="8"/>
    <text class="label" x="34" y="54">A. Closer Lockup v2</text>
    <text class="note" x="34" y="86">More spacing between d and l</text>
    <g transform="translate(63 135)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="30" y="226" class="markD" fill="#f7f4ea">d</text>
      <text x="130" y="226" class="markL" fill="#ff5a1f">l</text>
      <g clip-path="url(#dClipMain)">
        <path class="crackDark" d="M68 84l38 28 36-12 38 26"/>
        <path class="crackDark" d="M106 112l-18 44 32 28-8 44"/>
        <path class="crackDark" d="M146 102l10 43 38 23"/>
        <path class="crackDark" d="M80 172l46-4 34 32 38-8"/>
      </g>
      <rect x="66" y="176" width="38" height="38" rx="5" fill="#80d99a"/>
      <path d="M71 184l28 22M99 184l-22 25" stroke="#151008" stroke-width="4"/>
    </g>
    <text x="34" y="464" class="word" style="font-size:48px">drylake</text>
    <rect x="36" y="490" width="204" height="12" fill="#ff5a1f"/>
  </g>

  <g transform="translate(505 250)">
    <rect class="panel" x="0" y="0" width="390" height="540" rx="8"/>
    <text class="label" x="34" y="54">B. No Card Accent</text>
    <text class="note" x="34" y="86">Cleaner at tiny icon size</text>
    <g transform="translate(63 135)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="30" y="226" class="markD" fill="#f7f4ea">d</text>
      <text x="130" y="226" class="markL" fill="#ff5a1f">l</text>
      <g clip-path="url(#dClipMain)">
        <path class="crackDark" d="M68 84l38 28 36-12 38 26"/>
        <path class="crackDark" d="M106 112l-18 44 32 28-8 44"/>
        <path class="crackDark" d="M146 102l10 43 38 23"/>
        <path class="crackDark" d="M80 172l46-4 34 32 38-8"/>
      </g>
    </g>
    <text x="34" y="464" class="word" style="font-size:48px">drylake</text>
    <rect x="36" y="490" width="204" height="12" fill="#ff5a1f"/>
  </g>

  <g transform="translate(940 250)">
    <rect class="panel" x="0" y="0" width="390" height="540" rx="8"/>
    <text class="label" x="34" y="54">C. Mono Extension</text>
    <text class="note" x="34" y="86">Black/white compatible</text>
    <g transform="translate(63 135)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#090a0a" stroke="#2b332e" stroke-width="10"/>
      <text x="30" y="226" class="markD" fill="#f7f4ea">d</text>
      <text x="130" y="226" class="markL" fill="#f7f4ea">l</text>
      <g clip-path="url(#dClipMono)">
        <path class="crackDark" d="M68 84l38 28 36-12 38 26"/>
        <path class="crackDark" d="M106 112l-18 44 32 28-8 44"/>
        <path class="crackDark" d="M146 102l10 43 38 23"/>
        <path class="crackDark" d="M80 172l46-4 34 32 38-8"/>
      </g>
    </g>
    <text x="34" y="464" class="word" style="font-size:48px">drylake</text>
    <rect x="36" y="490" width="204" height="12" fill="#f7f4ea"/>
  </g>

  <g transform="translate(92 845)">
    <text class="label" x="0" y="0">Small-size read:</text>
    <g transform="translate(220 -62) scale(.32)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="30" y="226" class="markD" fill="#f7f4ea">d</text>
      <text x="130" y="226" class="markL" fill="#ff5a1f">l</text>
    </g>
    <g transform="translate(342 -47) scale(.24)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="30" y="226" class="markD" fill="#f7f4ea">d</text>
      <text x="130" y="226" class="markL" fill="#ff5a1f">l</text>
    </g>
    <g transform="translate(444 -36) scale(.17)">
      <rect x="0" y="0" width="264" height="264" rx="30" fill="#151008" stroke="#ff5a1f" stroke-width="12"/>
      <text x="30" y="226" class="markD" fill="#f7f4ea">d</text>
      <text x="130" y="226" class="markL" fill="#ff5a1f">l</text>
    </g>
    <text class="note" x="540" y="0">The card accent can be used in large branding, but the cleaner mark is better for extension icons.</text>
  </g>
</svg>
