      <rect x="16" y="92" width="196" height="30" rx="4" fill="#f7f4ea" stroke="#111111" stroke-width="3"/><text x="30" y="112" fill="#111111" font-size="12" font-weight="900">GitHub Copilot</text><text x="192" y="112" fill="#111111" font-size="12" font-weight="900">▾</text>
