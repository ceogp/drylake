      <text x="138" y="34" fill="#D1D5DB">Codex</text>

      <rect x="206" y="14" width="80" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="222" y="34" fill="#D1D5DB">Cursor</text>

      <rect x="294" y="14" width="76" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="312" y="34" fill="#D1D5DB">Cline</text>

      <rect x="378" y="14" width="100" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="394" y="34" fill="#D1D5DB">Continue</text>

      <rect x="486" y="14" width="76" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="502" y="34" fill="#D1D5DB">Aider</text>

      <rect x="570" y="14" width="100" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="588" y="34" fill="#D1D5DB">Windsurf</text>

      <rect x="678" y="14" width="120" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="694" y="34" fill="#D1D5DB">GitHub Copilot</text>

      <rect x="806" y="14" width="100" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="822" y="34" fill="#D1D5DB">Roo Code</text>

      <rect x="914" y="14" width="100" height="30" rx="8" fill="#1F2937" stroke="#374151"/>
      <text x="930" y="34" fill="#D1D5DB">Augment</text>

      <rect x="1022" y="14" width="160" height="30" rx="8" fill="#1F2937" stroke="#4B5563" stroke-dasharray="3 3"/>
