      <text x="16" y="28" fill="#9CA3AF" font-size="10" letter-spacing="2" font-weight="700">PHASE 1 · DONE</text>
      <text x="16" y="56" fill="#F3F4F6" font-size="15" font-weight="700">Scope &amp; design</text>
