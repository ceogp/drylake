      <text x="18" y="218" fill="#111111" font-size="13">○ E2E regression</text>
      <text x="18" y="244" fill="#111111" font-size="13">○ Snapshot updates</text>
    </g>

    <g transform="translate(340 0)">
      <rect x="0" y="0" width="300" height="34" rx="4" fill="#ff5a1f" stroke="#111111" stroke-width="4"/>
      <text x="16" y="23" fill="#ffffff" font-size="11" letter-spacing="2" font-weight="900">ACTIVE · 1</text>
      <rect x="0" y="52" width="300" height="270" rx="6" fill="#fff7ed" stroke="#ff5a1f" stroke-width="6"/>
