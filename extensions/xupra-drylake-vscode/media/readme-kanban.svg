    <g transform="translate(1020 0)">
      <rect x="0" y="0" width="300" height="34" rx="4" fill="#36b979" stroke="#111111" stroke-width="4"/>
      <text x="16" y="23" fill="#111111" font-size="11" letter-spacing="2" font-weight="900">DONE · 2</text>
      <rect x="0" y="52" width="300" height="116" rx="6" fill="#ffffff" stroke="#36b979" stroke-width="4"/>
