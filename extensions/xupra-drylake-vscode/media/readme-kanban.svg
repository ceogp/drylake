      <text x="18" y="148" fill="#4b463f" font-size="12">4 / 4 steps complete</text>
      <rect x="0" y="186" width="300" height="116" rx="6" fill="#ffffff" stroke="#36b979" stroke-width="4"/>
      <text x="18" y="218" fill="#4b463f" font-size="17" font-weight="900" text-decoration="line-through">Phase 0 · Discovery</text>
      <rect x="18" y="236" width="130" height="26" rx="4" fill="#ffd60a" stroke="#111111" stroke-width="3"/>
