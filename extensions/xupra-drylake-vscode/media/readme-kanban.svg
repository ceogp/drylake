<svg width="1400" height="800" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1400" height="800" rx="32" fill="url(#bg)"/>

  <!-- top bar / Planning AI banner -->
  <rect x="40" y="40" width="1320" height="70" rx="14" fill="#1F2937" stroke="#F97316" stroke-width="2"/>
  <circle cx="78" cy="75" r="14" fill="#F97316"/>
  <text x="104" y="70" fill="#FED7AA" font-size="13" font-weight="600" letter-spacing="2">PLANNING AI</text>
  <text x="104" y="92" fill="#F9FAFB" font-size="17" font-weight="700">Xupra Pro AI · Connected · Pro tier</text>
  <rect x="1130" y="58" width="210" height="34" rx="10" fill="#374151"/>
  <text x="1148" y="80" fill="#F3F4F6" font-size="13" font-weight="600">⇄ Switch Planning AI</text>

  <!-- chat panel -->
  <rect x="40" y="130" width="1320" height="110" rx="14" fill="#111827" stroke="#1F2937"/>
  <text x="60" y="160" fill="#9CA3AF" font-size="10" letter-spacing="2" font-weight="700">PLANNING CHAT</text>
  <rect x="60" y="172" width="660" height="34" rx="8" fill="#1F2937" stroke="#F97316" stroke-width="1.5"/>
  <text x="78" y="194" fill="#F3F4F6" font-size="13">You: also add Stripe webhooks for refunds</text>
  <rect x="60" y="210" width="900" height="24" rx="6" fill="#0F172A"/>
  <text x="78" y="227" fill="#9CA3AF" font-size="12" font-style="italic">Xupra Pro AI: Updated. Added "Refund webhook handler" to phase 3 — check the kanban below.</text>
  <rect x="1190" y="180" width="150" height="40" rx="10" fill="#F97316"/>
  <text x="1218" y="206" fill="white" font-size="14" font-weight="700">Send ▸</text>

  <!-- KANBAN columns -->
  <g transform="translate(40 260)">
    <!-- column headers -->
    <g font-size="11" letter-spacing="2" font-weight="700">
      <rect x="0" y="0" width="320" height="32" rx="8" fill="#1F2937"/>
      <text x="16" y="21" fill="#9CA3AF">PENDING · 2</text>

      <rect x="335" y="0" width="320" height="32" rx="8" fill="#1F2937"/>
      <text x="351" y="21" fill="#F97316">ACTIVE · 1</text>

      <rect x="670" y="0" width="320" height="32" rx="8" fill="#1F2937"/>
      <text x="686" y="21" fill="#FBBF24">VALIDATING · 1</text>

      <rect x="1005" y="0" width="315" height="32" rx="8" fill="#1F2937"/>
      <text x="1021" y="21" fill="#34D399">DONE · 2</text>
    </g>

    <!-- PENDING card -->
    <g filter="url(#shadow)">
      <rect x="0" y="48" width="320" height="220" rx="14" fill="#1F2937" stroke="#374151"/>
      <text x="18" y="76" fill="#F3F4F6" font-size="15" font-weight="700">Phase 4 · Tests</text>
      <text x="18" y="98" fill="#9CA3AF" font-size="11">Suggested agent</text>
      <rect x="18" y="106" width="120" height="24" rx="12" fill="#0F172A" stroke="#F97316"/>
      <text x="32" y="123" fill="#FED7AA" font-size="12" font-weight="600">▸ Cline</text>
      <rect x="18" y="146" width="280" height="2" fill="#374151"/>
      <g font-size="12" fill="#D1D5DB">
        <circle cx="26" cy="170" r="6" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <text x="42" y="174">Unit tests for refund logic</text>
        <circle cx="26" cy="194" r="6" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <text x="42" y="198">E2E checkout regression</text>
        <circle cx="26" cy="218" r="6" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <text x="42" y="222">Snapshot updates</text>
      </g>
      <rect x="200" y="240" width="100" height="22" rx="8" fill="#374151"/>
      <text x="218" y="256" fill="#D1D5DB" font-size="11" font-weight="600">Handoff ▸</text>
    </g>

    <!-- ACTIVE card -->
    <g filter="url(#shadow)" transform="translate(335 0)">
      <rect x="0" y="48" width="320" height="270" rx="14" fill="#1F2937" stroke="url(#active)" stroke-width="2.5"/>
      <rect x="0" y="48" width="320" height="6" rx="3" fill="url(#active)"/>
      <text x="18" y="80" fill="#FED7AA" font-size="10" letter-spacing="2" font-weight="700">ACTIVE NOW</text>
      <text x="18" y="102" fill="#F9FAFB" font-size="15" font-weight="700">Phase 3 · Stripe webhooks</text>
      <text x="18" y="122" fill="#9CA3AF" font-size="11">Suggested agent</text>
      <rect x="18" y="130" width="160" height="24" rx="12" fill="#0F172A" stroke="#F97316"/>
      <text x="32" y="147" fill="#FED7AA" font-size="12" font-weight="600">▸ Claude Code</text>
      <rect x="18" y="170" width="280" height="2" fill="#374151"/>
      <g font-size="12" fill="#E5E7EB">
        <circle cx="26" cy="192" r="6" fill="#34D399"/>
        <path d="M 22 192 l 3 3 l 6 -6" stroke="#0F172A" stroke-width="1.8" fill="none"/>
        <text x="42" y="196" text-decoration="line-through" fill="#6B7280">Add webhook route</text>

        <circle cx="26" cy="216" r="6" fill="#F97316"/>
        <text x="42" y="220" fill="#F3F4F6" font-weight="600">Verify signature (in progress)</text>

        <circle cx="26" cy="240" r="6" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <text x="42" y="244">Refund webhook handler</text>

        <circle cx="26" cy="264" r="6" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        <text x="42" y="268">Idempotency keys</text>
      </g>
      <rect x="180" y="288" width="120" height="26" rx="9" fill="url(#active)"/>
      <text x="200" y="306" fill="white" font-size="12" font-weight="700">Handoff to Claude ▸</text>
    </g>

    <!-- VALIDATING card -->
    <g filter="url(#shadow)" transform="translate(670 0)">
      <rect x="0" y="48" width="320" height="190" rx="14" fill="#1F2937" stroke="#FBBF24" stroke-width="1.5"/>
      <text x="18" y="76" fill="#F3F4F6" font-size="15" font-weight="700">Phase 2 · API layer</text>
      <text x="18" y="98" fill="#9CA3AF" font-size="11">Validated by</text>
      <rect x="18" y="106" width="140" height="24" rx="12" fill="#0F172A" stroke="#FBBF24"/>
      <text x="32" y="123" fill="#FDE68A" font-size="12" font-weight="600">▸ Cursor</text>
      <rect x="18" y="146" width="280" height="2" fill="#374151"/>
      <g font-size="12" fill="#D1D5DB">
        <text x="18" y="174">✓ 12 / 12 steps complete</text>
        <text x="18" y="196">⌛ Running validation suite…</text>
      </g>
    </g>

    <!-- DONE cards -->
    <g filter="url(#shadow)" transform="translate(1005 0)">
      <rect x="0" y="48" width="315" height="120" rx="14" fill="#0F172A" stroke="#34D399" stroke-opacity="0.5"/>
      <text x="18" y="76" fill="#9CA3AF" font-size="15" font-weight="700" text-decoration="line-through">Phase 1 · Scope</text>
      <rect x="18" y="92" width="100" height="22" rx="11" fill="#0F172A" stroke="#34D399"/>
      <text x="32" y="108" fill="#6EE7B7" font-size="11" font-weight="600">✓ Codex</text>
      <text x="18" y="142" fill="#6B7280" font-size="11">4 / 4 steps · 12m ago</text>

      <rect x="0" y="180" width="315" height="120" rx="14" fill="#0F172A" stroke="#34D399" stroke-opacity="0.5"/>
      <text x="18" y="208" fill="#9CA3AF" font-size="15" font-weight="700" text-decoration="line-through">Phase 0 · Discovery</text>
      <rect x="18" y="224" width="130" height="22" rx="11" fill="#0F172A" stroke="#34D399"/>
      <text x="32" y="240" fill="#6EE7B7" font-size="11" font-weight="600">✓ Copilot</text>
      <text x="18" y="274" fill="#6B7280" font-size="11">6 / 6 steps · 28m ago</text>
    </g>
  </g>

  <!-- footer caption -->
  <text x="700" y="775" fill="#9CA3AF" font-size="14" text-anchor="middle">DryLake Control Room · Drag phases · Pick any agent per phase · Tick steps and the next phase auto-activates</text>
</svg>
