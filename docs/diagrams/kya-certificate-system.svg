<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1280" viewBox="0 0 1760 1280" role="img" aria-labelledby="title desc">
  <title id="title">KYA Certificate System</title>
  <desc id="desc">Architecture diagram for the Xupra KYA certificate lifecycle, AWS trust services, and live verification handshake.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .zone { fill: #ffffff; stroke: #cfd6e4; stroke-width: 2; rx: 8; ry: 8; }
      .zone-aws { fill: #f9fbff; stroke: #8aa2d3; stroke-width: 2; rx: 8; ry: 8; }
      .zone-external { fill: #fffaf3; stroke: #c29a57; stroke-width: 2; rx: 8; ry: 8; }
      .box { fill: #ffffff; stroke: #344054; stroke-width: 1.5; rx: 8; ry: 8; }
      .box-blue { fill: #eef4ff; stroke: #3b6ed4; stroke-width: 1.5; rx: 8; ry: 8; }
      .box-green { fill: #eefaf1; stroke: #2f8f57; stroke-width: 1.5; rx: 8; ry: 8; }
      .box-orange { fill: #fff4e5; stroke: #b86a00; stroke-width: 1.5; rx: 8; ry: 8; }
      .box-slate { fill: #f7f8fa; stroke: #667085; stroke-width: 1.5; rx: 8; ry: 8; }
      .title { font: 700 28px Arial, sans-serif; fill: #101828; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #475467; }
      .zone-title { font: 700 18px Arial, sans-serif; fill: #101828; }
      .label { font: 700 14px Arial, sans-serif; fill: #101828; }
      .meta { font: 700 11px Arial, sans-serif; fill: #475467; letter-spacing: 0.08em; text-transform: uppercase; }
      .body { font: 400 13px Arial, sans-serif; fill: #344054; }
      .small { font: 400 12px Arial, sans-serif; fill: #475467; }
      .arrow { stroke: #475467; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #7b8794; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrow-dash { stroke: #667085; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475467"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1760" height="1280"/>

  <text class="title" x="40" y="48">Xupra KYA Certificate System</text>
  <text class="subtitle" x="40" y="74">Operator-led onboarding, AWS-backed signing and publication, live public lookup, and hosted MCP handshake verification.</text>

  <rect class="zone" x="36" y="108" width="1688" height="212"/>
  <text class="zone-title" x="60" y="140">1. Business and issuance lifecycle</text>

  <rect class="box" x="62" y="170" width="218" height="112"/>
  <text class="meta" x="80" y="194">Step 1</text>
  <text class="label" x="80" y="218">Discovery</text>
  <text class="body" x="80" y="242">
    <tspan x="80" dy="0">Xupra finds a company MCP</tspan>
    <tspan x="80" dy="18">server, agent, endpoint, or</tspan>
    <tspan x="80" dy="18">agent card worth reviewing.</tspan>
  </text>

  <rect class="box" x="314" y="170" width="218" height="112"/>
  <text class="meta" x="332" y="194">Step 2</text>
  <text class="label" x="332" y="218">Outreach</text>
  <text class="body" x="332" y="242">
    <tspan x="332" dy="0">The company receives an email</tspan>
    <tspan x="332" dy="18">and reviews xupracorp.com,</tspan>
    <tspan x="332" dy="18">KYA, the standard, and scope.</tspan>
  </text>

  <rect class="box-orange" x="566" y="170" width="218" height="112"/>
  <text class="meta" x="584" y="194">Step 3</text>
  <text class="label" x="584" y="218">Invoice and payment</text>
  <text class="body" x="584" y="242">
    <tspan x="584" dy="0">Xupra sends a Stripe invoice.</tspan>
    <tspan x="584" dy="18">Testing and certificate issuance</tspan>
    <tspan x="584" dy="18">stay blocked until paid.</tspan>
  </text>

  <rect class="box" x="818" y="170" width="218" height="112"/>
  <text class="meta" x="836" y="194">Step 4</text>
  <text class="label" x="836" y="218">Testing and review</text>
  <text class="body" x="836" y="242">
    <tspan x="836" dy="0">Operator records test runs,</tspan>
    <tspan x="836" dy="18">risk class, KYA level, survey,</tspan>
    <tspan x="836" dy="18">and remediation outcomes.</tspan>
  </text>

  <rect class="box-blue" x="1070" y="170" width="260" height="112"/>
  <text class="meta" x="1088" y="194">Step 5</text>
  <text class="label" x="1088" y="218">Issue hosted certificate</text>
  <text class="body" x="1088" y="242">
    <tspan x="1088" dy="0">The app signs the canonical</tspan>
    <tspan x="1088" dy="18">certificate, binds the reviewed</tspan>
    <tspan x="1088" dy="18">asset identity, and stores status.</tspan>
  </text>

  <rect class="box-green" x="1364" y="170" width="332" height="112"/>
  <text class="meta" x="1382" y="194">Step 6</text>
  <text class="label" x="1382" y="218">Publish and verify</text>
  <text class="body" x="1382" y="242">
    <tspan x="1382" dy="0">Public registry, certificate page, JSON API,</tspan>
    <tspan x="1382" dy="18">badge, issuer metadata, and hosted MCP</tspan>
    <tspan x="1382" dy="18">verification server become usable.</tspan>
  </text>

  <path class="arrow" d="M 280 226 C 296 226, 300 226, 314 226"/>
  <path class="arrow" d="M 532 226 C 548 226, 552 226, 566 226"/>
  <path class="arrow" d="M 784 226 C 800 226, 804 226, 818 226"/>
  <path class="arrow" d="M 1036 226 C 1052 226, 1056 226, 1070 226"/>
  <path class="arrow" d="M 1330 226 C 1346 226, 1350 226, 1364 226"/>

  <rect class="zone-aws" x="36" y="344" width="1026" height="620"/>
  <text class="zone-title" x="60" y="376">2. Xupra-hosted trust system inside AWS</text>

  <rect class="box-blue" x="62" y="404" width="450" height="176"/>
  <text class="meta" x="82" y="430">Private operator surface</text>
  <text class="label" x="82" y="454">/portal on the internal operator host</text>
  <text class="body" x="82" y="478">
    <tspan x="82" dy="0">Hosted path:</tspan>
    <tspan x="82" dy="18">Client VPN/private network -&gt; private Route53</tspan>
    <tspan x="82" dy="18">-&gt; internal ALB -&gt; portal host</tspan>
    <tspan x="82" dy="18">portal.ops.xupracorp.internal/portal</tspan>
    <tspan x="82" dy="18">Company records, invoices, test evidence, and certificate lifecycle.</tspan>
  </text>

  <rect class="box-blue" x="62" y="612" width="450" height="296"/>
  <text class="meta" x="82" y="638">Public and API runtime</text>
  <text class="label" x="82" y="662">EC2 host running nginx and Next.js KYA services</text>
  <text class="body" x="82" y="686">
    <tspan x="82" dy="0">Public endpoints served from xupracorp.com:</tspan>
    <tspan x="82" dy="18">- /kya-registry</tspan>
    <tspan x="82" dy="18">- /kya-registry/registry</tspan>
    <tspan x="82" dy="18">- /kya-registry/certificates/:certificateId</tspan>
    <tspan x="82" dy="18">- /api/kya-registry/v1/certificates/:certificateId</tspan>
    <tspan x="82" dy="18">- /.well-known/kya-registry.json</tspan>
    <tspan x="82" dy="18">- /api/kya-registry/v1/mcp</tspan>
    <tspan x="82" dy="18">Live revocation-aware status remains application-authoritative.</tspan>
  </text>

  <rect class="box-slate" x="552" y="404" width="224" height="162"/>
  <text class="meta" x="570" y="430">Primary state</text>
  <text class="label" x="570" y="454">Amazon RDS PostgreSQL</text>
  <text class="body" x="570" y="478">
    <tspan x="570" dy="0">TrustCompany</tspan>
    <tspan x="570" dy="18">TrustRegistryCase</tspan>
    <tspan x="570" dy="18">TrustRegistryAsset</tspan>
    <tspan x="570" dy="18">TrustRegistryTestRun</tspan>
    <tspan x="570" dy="18">TrustCertificate</tspan>
  </text>

  <rect class="box-slate" x="806" y="404" width="224" height="162"/>
  <text class="meta" x="824" y="430">Signing</text>
  <text class="label" x="824" y="454">AWS KMS</text>
  <text class="body" x="824" y="478">
    <tspan x="824" dy="0">Signs the certificate payload.</tspan>
    <tspan x="824" dy="18">Public key is published through</tspan>
    <tspan x="824" dy="18">issuer metadata for verifiers.</tspan>
  </text>

  <rect class="box-slate" x="552" y="602" width="224" height="162"/>
  <text class="meta" x="570" y="628">Publication archive</text>
  <text class="label" x="570" y="652">Amazon S3</text>
  <text class="body" x="570" y="676">
    <tspan x="570" dy="0">Stores publication bundles:</tspan>
    <tspan x="570" dy="18">signed-certificate.json</tspan>
    <tspan x="570" dy="18">canonical-certificate.json</tspan>
    <tspan x="570" dy="18">publication-manifest.json</tspan>
  </text>

  <rect class="box-slate" x="806" y="602" width="224" height="162"/>
  <text class="meta" x="824" y="628">Runtime secrets</text>
  <text class="label" x="824" y="652">AWS Secrets Manager</text>
  <text class="body" x="824" y="676">
    <tspan x="824" dy="0">Stores env bundles, portal auth,</tspan>
    <tspan x="824" dy="18">KMS key ids, and Stripe keys.</tspan>
  </text>

  <rect class="box-orange" x="552" y="800" width="478" height="108"/>
  <text class="meta" x="570" y="826">Billing authority</text>
  <text class="label" x="570" y="850">Stripe</text>
  <text class="body" x="570" y="874">
    <tspan x="570" dy="0">Invoice paid state is synchronized into registry cases.</tspan>
    <tspan x="570" dy="18">KYA testing and certificate issuance hard-fail until payment is confirmed.</tspan>
  </text>

  <path class="arrow-soft" d="M 512 490 C 530 490, 538 490, 552 490"/>
  <path class="arrow-soft" d="M 512 704 C 530 704, 538 704, 552 704"/>
  <path class="arrow-soft" d="M 512 750 C 650 750, 708 520, 806 520"/>
  <path class="arrow-soft" d="M 512 786 C 640 786, 660 854, 552 854"/>
  <path class="arrow-soft" d="M 776 490 C 790 490, 798 490, 806 490"/>
  <path class="arrow-soft" d="M 776 682 C 790 682, 798 682, 806 682"/>

  <rect class="zone-external" x="1090" y="344" width="634" height="620"/>
  <text class="zone-title" x="1114" y="376">3. External participants and verification flow</text>

  <rect class="box-orange" x="1116" y="406" width="280" height="178"/>
  <text class="meta" x="1134" y="432">Remote company</text>
  <text class="label" x="1134" y="456">Certified company infrastructure</text>
  <text class="body" x="1134" y="480">
    <tspan x="1134" dy="0">Hosts the actual MCP server or agent.</tspan>
    <tspan x="1134" dy="18">Publishes an agent file or agent card</tspan>
    <tspan x="1134" dy="18">with a hosted certificate URL or ID.</tspan>
    <tspan x="1134" dy="18">Signs live challenges with the certified</tspan>
    <tspan x="1134" dy="18">operational key bound to the asset.</tspan>
  </text>

  <rect class="box-orange" x="1420" y="406" width="280" height="178"/>
  <text class="meta" x="1438" y="432">Verifier side</text>
  <text class="label" x="1438" y="456">Peer agent or relying system</text>
  <text class="body" x="1438" y="480">
    <tspan x="1438" dy="0">Needs to decide whether it can</tspan>
    <tspan x="1438" dy="18">exchange data, invoke tools, or</tspan>
    <tspan x="1438" dy="18">send payment instructions to the</tspan>
    <tspan x="1438" dy="18">remote company agent.</tspan>
  </text>

  <rect class="box" x="1116" y="626" width="584" height="120"/>
  <text class="meta" x="1134" y="652">Offline path</text>
  <text class="label" x="1134" y="676">Issuer metadata and hosted certificate lookup</text>
  <text class="body" x="1134" y="700">
    <tspan x="1134" dy="0">1. Fetch /.well-known/kya-registry.json for issuer public key and published policies.</tspan>
    <tspan x="1134" dy="18">2. Fetch /api/kya-registry/v1/certificates/:id for the hosted certificate</tspan>
    <tspan x="1134" dy="18">   and current status.</tspan>
    <tspan x="1134" dy="18">3. Evaluate KYA level, risk class, expiry, revocation state, and subject binding.</tspan>
  </text>

  <rect class="box-green" x="1116" y="782" width="584" height="144"/>
  <text class="meta" x="1134" y="808">Live path</text>
  <text class="label" x="1134" y="832">Hosted MCP verification handshake</text>
  <text class="body" x="1134" y="856">
    <tspan x="1134" dy="0">1. Verifier calls kya_prepare_handshake on /api/kya-registry/v1/mcp.</tspan>
    <tspan x="1134" dy="18">2. Remote company agent signs the challenge text with the certified operational key.</tspan>
    <tspan x="1134" dy="18">3. Verifier calls kya_verify_handshake or kya_evaluate_policy for a transaction-aware trust decision.</tspan>
    <tspan x="1134" dy="18">4. The app checks signature, status, subject binding, KYA policy, and risk thresholds.</tspan>
  </text>

  <path class="arrow" d="M 1396 494 C 1408 494, 1412 494, 1420 494"/>
  <path class="arrow-soft" d="M 1420 540 C 1380 540, 1358 640, 1400 640"/>
  <path class="arrow-soft" d="M 1420 560 C 1350 560, 1340 790, 1400 790"/>
  <path class="arrow-soft" d="M 1116 686 C 1030 686, 980 704, 512 704"/>
  <path class="arrow-soft" d="M 1116 854 C 1030 854, 980 786, 512 786"/>
  <path class="arrow-dash" d="M 1256 584 C 1256 602, 1256 610, 1256 626"/>
  <path class="arrow-dash" d="M 1560 584 C 1560 602, 1560 610, 1560 626"/>
  <path class="arrow-dash" d="M 1256 746 C 1256 764, 1256 770, 1256 782"/>
  <path class="arrow-dash" d="M 1560 746 C 1560 764, 1560 770, 1560 782"/>

  <rect class="zone" x="36" y="988" width="1688" height="246"/>
  <text class="zone-title" x="60" y="1020">4. What is authoritative where</text>

  <rect class="box" x="62" y="1052" width="524" height="138"/>
  <text class="meta" x="80" y="1078">Authoritative state</text>
  <text class="body" x="80" y="1102">
    <tspan x="80" dy="0">RDS plus the application runtime are authoritative for current certificate status.</tspan>
    <tspan x="80" dy="18">That is why suspend, revoke, expire, and reactivate changes can take effect immediately</tspan>
    <tspan x="80" dy="18">even when signed publication bundles already exist in S3.</tspan>
  </text>

  <rect class="box" x="620" y="1052" width="524" height="138"/>
  <text class="meta" x="638" y="1078">Cryptographic trust anchor</text>
  <text class="body" x="638" y="1102">
    <tspan x="638" dy="0">AWS KMS is the signing authority for hosted certificate artifacts.</tspan>
    <tspan x="638" dy="18">Issuer metadata exposes the public key and published policy matrix so external verifiers</tspan>
    <tspan x="638" dy="18">can validate issuer identity and expected transaction rules.</tspan>
  </text>

  <rect class="box" x="1178" y="1052" width="520" height="138"/>
  <text class="meta" x="1196" y="1078">Current live limitation</text>
  <text class="body" x="1196" y="1102">
    <tspan x="1196" dy="0">The production public registry currently has no published companies or certificates.</tspan>
    <tspan x="1196" dy="18">So the infrastructure and verification protocol are live, but the first successful</tspan>
    <tspan x="1196" dy="18">production trust evaluation still depends on issuing the first real certificate.</tspan>
  </text>
</svg>
